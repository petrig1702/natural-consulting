<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Boards — Trello-Klon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Inter', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            neon: '0 0 30px rgba(56,189,248,.35), 0 0 80px rgba(236,72,153,.25)',
            glass: '0 20px 60px rgba(0,0,0,.45)'
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg1: #06070f;
      --bg2: #0d1330;
      --bg3: #1b1140;
      --txt: #eaf2ff;
      --soft: rgba(255,255,255,.14);
      --glow: #67e8f9;
      --glow2: #f472b6;
      --card: rgba(13, 19, 48, .45);
      --cursor: #67e8f9;
      --cursor-dot: #ffffff;
    }
    .light {
      --bg1: #f3f7ff;
      --bg2: #d8ebff;
      --bg3: #fff4e6;
      --txt: #111827;
      --soft: rgba(17,24,39,.16);
      --glow: #2563eb;
      --glow2: #ec4899;
      --card: rgba(255,255,255,.65);
      --cursor: #111827;
      --cursor-dot: #2563eb;
    }
    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--txt);
      background: radial-gradient(1200px 800px at 10% 10%, var(--bg2), transparent 60%),
                  radial-gradient(1000px 700px at 90% 80%, var(--bg3), transparent 55%),
                  linear-gradient(130deg, var(--bg1), #070b1f 45%, #120f2d 100%);
      background-size: 180% 180%;
      animation: shiftBg 18s ease-in-out infinite;
      cursor: none;
    }
    @keyframes shiftBg { 0%,100%{background-position: 0% 50%;} 50%{background-position: 100% 50%;} }
    .glass {
      background: color-mix(in srgb, var(--card) 92%, transparent);
      backdrop-filter: blur(16px) saturate(150%);
      border: 1px solid var(--soft);
      box-shadow: 0 12px 50px rgba(0,0,0,.35);
    }
    .neon-border {
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--glow) 40%, transparent), 0 0 32px color-mix(in srgb, var(--glow2) 30%, transparent);
    }
    .board-col { min-width: 310px; max-width: 310px; }
    .card-tilt {
      transform-style: preserve-3d;
      transition: transform .18s ease, box-shadow .2s ease;
    }
    .card-tilt:hover { box-shadow: 0 12px 28px rgba(0,0,0,.35), 0 0 24px color-mix(in srgb, var(--glow) 24%, transparent); }
    .dragging {
      transform: scale(1.03) rotate(1.5deg) !important;
      box-shadow: 0 16px 40px rgba(0,0,0,.5), 0 0 40px color-mix(in srgb, var(--glow2) 35%, transparent);
      opacity: .88;
      z-index: 50;
    }
    .cursor-ring, .cursor-dot {
      position: fixed; left: 0; top: 0; pointer-events: none; z-index: 200;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
    }
    .cursor-ring {
      width: 34px; height: 34px; border-radius: 9999px;
      border: 1px solid color-mix(in srgb, var(--cursor) 70%, transparent);
      box-shadow: 0 0 22px color-mix(in srgb, var(--cursor) 45%, transparent);
    }
    .cursor-dot {
      width: 8px; height: 8px; border-radius: 9999px;
      background: var(--cursor-dot);
      box-shadow: 0 0 16px color-mix(in srgb, var(--cursor-dot) 80%, transparent);
    }
    .confetti {
      position: fixed; width: 8px; height: 12px; top: 0; left: 0; z-index: 300; pointer-events: none;
    }
    .markdown p { margin-bottom: .5rem; }
  </style>
</head>
<body class="h-full overflow-hidden">
  <div class="cursor-ring"></div><div class="cursor-dot"></div>
  <div class="h-full flex flex-col">
    <header class="glass neon-border mx-4 mt-4 rounded-2xl px-4 py-3 flex items-center justify-between gap-4">
      <div>
        <h1 class="text-xl md:text-2xl font-black tracking-tight">Neon Boards</h1>
        <p class="text-xs opacity-75">Single-File Trello-Klon • Animation-first • localStorage</p>
      </div>
      <div class="flex flex-wrap items-center gap-2 text-xs">
        <select id="themeSel" class="glass rounded-xl px-2 py-1"></select>
        <button id="modeBtn" class="glass rounded-xl px-3 py-1.5">Dark/Light</button>
        <button id="templateBtn" class="glass rounded-xl px-3 py-1.5">Template</button>
        <button id="newBoardBtn" class="glass rounded-xl px-3 py-1.5">+ Board</button>
        <button id="exportBtn" class="glass rounded-xl px-3 py-1.5">Export</button>
        <label class="glass rounded-xl px-3 py-1.5 cursor-pointer">Import<input id="importInput" type="file" accept="application/json" class="hidden"></label>
      </div>
    </header>

    <section class="px-4 pt-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <select id="boardSel" class="glass rounded-xl px-3 py-2 text-sm"></select>
        <button id="addListBtn" class="glass rounded-xl px-3 py-2 text-sm">+ Liste</button>
      </div>
      <div id="memberRow" class="flex items-center gap-2"></div>
    </section>

    <main id="boardWrap" class="flex-1 overflow-auto p-4">
      <div id="lists" class="flex gap-4 items-start pb-8"></div>
    </main>
  </div>

  <dialog id="cardModal" class="w-[min(920px,96vw)] rounded-2xl p-0 bg-transparent">
    <div class="glass neon-border rounded-2xl p-4 md:p-6 text-sm">
      <div class="flex justify-between items-center mb-3"><h2 class="text-xl font-bold" id="mTitle"></h2><button onclick="cardModal.close()">✕</button></div>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="space-y-3">
          <input id="mCardTitle" class="w-full glass rounded-xl px-3 py-2" placeholder="Titel">
          <textarea id="mDesc" class="w-full h-28 glass rounded-xl px-3 py-2" placeholder="Beschreibung (Markdown)"></textarea>
          <div class="markdown glass rounded-xl p-3 min-h-16" id="mPreview"></div>
          <input id="mDue" type="date" class="glass rounded-xl px-3 py-2">
          <input id="mLabels" placeholder="Labels, comma-separated" class="w-full glass rounded-xl px-3 py-2">
          <input id="mImg" placeholder="Bild-URL" class="w-full glass rounded-xl px-3 py-2">
        </div>
        <div class="space-y-3">
          <div class="glass rounded-xl p-3">
            <div class="flex justify-between"><strong>Checkliste</strong><button id="addCheck">+ Item</button></div>
            <div id="checklist" class="mt-2 space-y-2"></div>
          </div>
          <div class="glass rounded-xl p-3">
            <div class="flex justify-between"><strong>Kommentare</strong><button id="addComment">+ Kommentar</button></div>
            <div id="comments" class="mt-2 space-y-2 max-h-40 overflow-auto"></div>
            <input id="commentInput" class="w-full glass rounded-xl px-3 py-2 mt-2" placeholder="Kommentar schreiben...">
          </div>
          <button id="saveCard" class="w-full rounded-xl py-2 bg-cyan-400/80 text-black font-bold">Speichern</button>
        </div>
      </div>
    </div>
  </dialog>

  <script>
    const THEMES = {
      Aurora: ['#0b1024', '#1f194f', '#0f766e'],
      Cosmos: ['#020617', '#1e1b4b', '#581c87'],
      Sunset: ['#1f2937', '#7c2d12', '#be123c'],
      Forest: ['#052e16', '#14532d', '#134e4a'],
      Cyber: ['#030712', '#0c4a6e', '#831843'],
      'Minimal-Light': ['#f8fafc', '#dbeafe', '#fce7f3']
    };
    const TEMPLATES = {
      Kanban: ['Backlog', 'In Arbeit', 'Review', 'Done'],
      Sprint: ['Sprint Backlog', 'To Do', 'Doing', 'Testing', 'Done'],
      OKRs: ['Objectives', 'Key Results', 'Initiativen', 'Erledigt'],
      'Sales-Pipeline': ['Lead', 'Qualified', 'Proposal', 'Negotiation', 'Won']
    };

    const uid = () => Math.random().toString(36).slice(2, 9);
    const $ = (s) => document.querySelector(s);
    const state = {
      mode: 'dark',
      theme: 'Aurora',
      members: [
        {name:'Mia', color:'#22d3ee'},
        {name:'Noah', color:'#a78bfa'},
        {name:'Lea', color:'#f472b6'}
      ],
      boards: [],
      activeBoardId: null,
      activeCardRef: null
    };

    function makeDemoCards(){
      const pool = [
        'Landing Hero überarbeiten','Pricing Section optimieren','Onboarding Flow testen','Retargeting-Kampagne planen','Kundeninterview #42 auswerten',
        'Bug: Login Timeout','Animation Timing verbessern','Roadmap Q3 finalisieren','Partner Deal vorbereiten','Support Macro schreiben',
        'Referral Programm entwerfen','Widget Performance auditieren','SEO Snippets updaten','AB-Test: CTA Farbe','Mobile Nav neu denken',
        'API-Rate-Limit monitoren','Sales Deck polieren','Changelog v2.8 schreiben','Beta-Liste kuratieren','Customer Journey Map'
      ];
      return pool.map((title, i) => ({
        id: uid(), title, desc: `**${title}**\n\n- Owner: Team\n- Priorität: ${['Low','Medium','High'][i%3]}`,
        labels: [ ['Design','UX'], ['Growth','Marketing'], ['Tech','Bugfix'], ['Sales','Ops'] ][i%4],
        due: `2026-0${(i%8)+1}-${String((i%26)+1).padStart(2,'0')}`,
        checklist: [{id:uid(), text:'Kickoff', done:i%2===0}, {id:uid(), text:'Review', done:i%5===0}],
        comments: [{id:uid(), text:'Sieht stark aus 🚀', at:new Date().toISOString()}],
        image: i%4===0 ? `https://picsum.photos/seed/card${i}/600/300` : ''
      }));
    }

    function initData(){
      const saved = localStorage.getItem('neonBoards.v1');
      if (saved) Object.assign(state, JSON.parse(saved));
      else {
        const demo = makeDemoCards();
        const board = {
          id: uid(), name: 'Demo Board', template: 'Kanban',
          lists: TEMPLATES.Kanban.map((n, idx) => ({id:uid(), name:n, cards:[]}))
        };
        demo.forEach((c, i) => board.lists[i % board.lists.length].cards.push(c));
        state.boards = [board];
        state.activeBoardId = board.id;
      }
      if (!state.activeBoardId && state.boards[0]) state.activeBoardId = state.boards[0].id;
    }

    const save = () => localStorage.setItem('neonBoards.v1', JSON.stringify(state));
    const activeBoard = () => state.boards.find(b => b.id === state.activeBoardId);

    function applyTheme(){
      const [a,b,c] = THEMES[state.theme] || THEMES.Aurora;
      document.documentElement.style.setProperty('--bg1', a);
      document.documentElement.style.setProperty('--bg2', b);
      document.documentElement.style.setProperty('--bg3', c);
      document.body.classList.toggle('light', state.mode === 'light' || state.theme === 'Minimal-Light');
    }

    function renderTop(){
      $('#themeSel').innerHTML = Object.keys(THEMES).map(t => `<option ${t===state.theme?'selected':''}>${t}</option>`).join('');
      $('#boardSel').innerHTML = state.boards.map(b => `<option value="${b.id}" ${b.id===state.activeBoardId?'selected':''}>${b.name}</option>`).join('');
      $('#memberRow').innerHTML = state.members.map(m => `<div title="${m.name}" class="w-8 h-8 rounded-full border border-white/40 grid place-items-center text-xs font-bold" style="background:${m.color}">${m.name[0]}</div>`).join('');
    }

    function confetti(x,y){
      for(let i=0;i<22;i++){
        const d = document.createElement('div');
        d.className = 'confetti';
        d.style.background = ['#22d3ee','#f472b6','#a3e635','#f59e0b'][i%4];
        document.body.appendChild(d);
        gsap.set(d,{x,y,rotate:Math.random()*360,scale:Math.random()*1.2+.6});
        gsap.to(d,{x:x+(Math.random()-0.5)*260,y:y-(Math.random()*220+50),duration:.45,ease:'power2.out'});
        gsap.to(d,{y:y+220,opacity:0,rotate:'+=240',delay:.45,duration:.9,ease:'power1.in',onComplete:()=>d.remove()});
      }
    }

    function renderBoard(){
      const board = activeBoard(); if(!board) return;
      const wrap = $('#lists');
      wrap.innerHTML = board.lists.map(list => `
        <article class="board-col glass rounded-2xl p-3" data-list="${list.id}" ondragover="event.preventDefault()" ondrop="dropCard(event,'${list.id}')">
          <div class="flex items-center justify-between mb-2"><h3 class="font-bold">${list.name}</h3><button onclick="addCard('${list.id}')">+ Karte</button></div>
          <div class="space-y-2 min-h-8">
            ${list.cards.map(card => `
              <div class="card-tilt glass rounded-xl p-2 text-sm" draggable="true" data-card="${card.id}" data-list="${list.id}" onclick="openCard('${list.id}','${card.id}')" ondragstart="dragCard(event,'${list.id}','${card.id}')" onmousemove="tilt(event,this)" onmouseleave="untilt(this)">
                ${card.image ? `<img src="${card.image}" class="w-full h-24 object-cover rounded-lg mb-2" />` : ''}
                <div class="font-semibold">${card.title}</div>
                <div class="flex gap-1 flex-wrap mt-1">${(card.labels||[]).map(l=>`<span class='text-[10px] px-2 py-0.5 rounded-full bg-white/10'>${l}</span>`).join('')}</div>
                <div class="mt-1 text-[11px] opacity-75">Due: ${card.due || '—'}</div>
              </div>`).join('')}
          </div>
        </article>
      `).join('');

      gsap.from('.board-col',{opacity:0,y:24,stagger:.06,duration:.45,ease:'back.out(1.8)'});
      gsap.from('.card-tilt',{opacity:0,scale:.96,stagger:.015,duration:.34,ease:'power2.out'});
    }

    function addBoard(name='Neues Board', template='Kanban'){
      const lists = (TEMPLATES[template]||TEMPLATES.Kanban).map(n=>({id:uid(),name:n,cards:[]}));
      const board = {id:uid(), name, template, lists};
      state.boards.push(board); state.activeBoardId = board.id;
      sync();
    }

    function addList(){
      const n = prompt('Listenname?', 'Neue Liste'); if(!n) return;
      activeBoard().lists.push({id:uid(), name:n, cards:[]});
      sync();
    }

    function addCard(listId){
      const t = prompt('Kartentitel?', 'Neue Aufgabe'); if(!t) return;
      const list = activeBoard().lists.find(l=>l.id===listId);
      list.cards.unshift({id:uid(),title:t,desc:'',labels:[],due:'',checklist:[],comments:[],image:''});
      sync();
    }

    let drag = null;
    window.dragCard = (e,listId,cardId) => {
      drag = {listId, cardId};
      e.currentTarget.classList.add('dragging');
      setTimeout(()=>e.currentTarget.classList.remove('dragging'), 350);
    }
    window.dropCard = (e,targetListId) => {
      if(!drag) return;
      const b = activeBoard();
      const src = b.lists.find(l=>l.id===drag.listId);
      const dst = b.lists.find(l=>l.id===targetListId);
      const ix = src.cards.findIndex(c=>c.id===drag.cardId);
      if(ix<0) return;
      const [card] = src.cards.splice(ix,1); dst.cards.unshift(card);
      drag = null; sync();
    }

    window.tilt = (e,el) => {
      const r = el.getBoundingClientRect();
      const x = e.clientX - r.left, y = e.clientY - r.top;
      const rx = -(y/r.height - .5)*8, ry = (x/r.width - .5)*10;
      el.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) translateZ(0)`;
    }
    window.untilt = (el) => el.style.transform = '';

    window.openCard = (listId, cardId) => {
      const list = activeBoard().lists.find(l=>l.id===listId);
      const card = list.cards.find(c=>c.id===cardId);
      state.activeCardRef = {listId, cardId};
      $('#mTitle').textContent = 'Karte bearbeiten';
      $('#mCardTitle').value = card.title;
      $('#mDesc').value = card.desc || '';
      $('#mPreview').innerHTML = marked.parse(card.desc || '');
      $('#mDue').value = card.due || '';
      $('#mLabels').value = (card.labels||[]).join(', ');
      $('#mImg').value = card.image || '';
      $('#checklist').innerHTML = (card.checklist||[]).map(c => `<label class='flex items-center gap-2'><input type='checkbox' ${c.done?'checked':''} onchange="toggleCheck('${c.id}',this.checked,event)"><span>${c.text}</span></label>`).join('');
      $('#comments').innerHTML = (card.comments||[]).map(c => `<div class='glass rounded-lg p-2'>${c.text}<div class='text-[10px] opacity-60 mt-1'>${new Date(c.at).toLocaleString()}</div></div>`).join('');
      cardModal.showModal();
      gsap.from('#cardModal > div',{scale:.92,opacity:0,duration:.25,ease:'power2.out'});
    }

    window.toggleCheck = (id, done, ev) => {
      const {listId, cardId} = state.activeCardRef;
      const card = activeBoard().lists.find(l=>l.id===listId).cards.find(c=>c.id===cardId);
      const item = card.checklist.find(i=>i.id===id); item.done = done;
      if(done) confetti(ev.clientX, ev.clientY);
      save();
    }

    function currentCard(){
      if(!state.activeCardRef) return null;
      const {listId, cardId} = state.activeCardRef;
      return activeBoard().lists.find(l=>l.id===listId).cards.find(c=>c.id===cardId);
    }

    function sync(){ renderTop(); renderBoard(); applyTheme(); save(); }

    // Events
    $('#newBoardBtn').onclick = () => addBoard(prompt('Board Name?', 'Neon Project') || 'Neon Project');
    $('#addListBtn').onclick = addList;
    $('#boardSel').onchange = e => { state.activeBoardId = e.target.value; sync(); };
    $('#themeSel').onchange = e => { state.theme = e.target.value; sync(); };
    $('#modeBtn').onclick = () => { state.mode = state.mode === 'dark' ? 'light' : 'dark'; sync(); };
    $('#templateBtn').onclick = () => {
      const t = prompt('Template: Kanban, Sprint, OKRs, Sales-Pipeline', 'Sprint');
      if(!TEMPLATES[t]) return alert('Unbekanntes Template');
      addBoard(`${t} Board`, t);
    }
    $('#exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `neon-boards-${Date.now()}.json`; a.click();
    };
    $('#importInput').onchange = async (e) => {
      const file = e.target.files[0]; if(!file) return;
      const txt = await file.text();
      const obj = JSON.parse(txt);
      Object.assign(state, obj); sync();
    };

    $('#mDesc').oninput = e => $('#mPreview').innerHTML = marked.parse(e.target.value || '');
    $('#addCheck').onclick = () => {
      const txt = prompt('Checklist Item?', 'Neue Teilaufgabe'); if(!txt) return;
      const c = currentCard(); c.checklist ||= []; c.checklist.push({id:uid(), text:txt, done:false});
      openCard(state.activeCardRef.listId, state.activeCardRef.cardId);
    };
    $('#addComment').onclick = () => {
      const input = $('#commentInput'); if(!input.value.trim()) return;
      const c = currentCard(); c.comments ||= []; c.comments.push({id:uid(), text:input.value.trim(), at:new Date().toISOString()});
      input.value = ''; openCard(state.activeCardRef.listId, state.activeCardRef.cardId);
    };
    $('#saveCard').onclick = () => {
      const c = currentCard();
      c.title = $('#mCardTitle').value.trim() || 'Untitled';
      c.desc = $('#mDesc').value;
      c.due = $('#mDue').value;
      c.labels = $('#mLabels').value.split(',').map(s=>s.trim()).filter(Boolean);
      c.image = $('#mImg').value.trim();
      cardModal.close();
      sync();
      gsap.fromTo('[data-card="'+c.id+'"]',{scale:.92},{scale:1,duration:.3,ease:'back.out(1.8)'});
    }

    // Custom cursor
    const ring = document.querySelector('.cursor-ring');
    const dot = document.querySelector('.cursor-dot');
    let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
    window.addEventListener('mousemove', e => {mx=e.clientX;my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px';});
    gsap.ticker.add(()=>{ rx += (mx-rx)*0.2; ry += (my-ry)*0.2; ring.style.left=rx+'px'; ring.style.top=ry+'px'; });

    // Init
    initData();
    sync();
  </script>
</body>
</html>
